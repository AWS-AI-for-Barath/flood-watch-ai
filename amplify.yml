version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd "$AMPLIFY_SOURCE_DIRECTORY/mobile-app" && npm ci
    build:
      commands:
        # Robust environment variable injection using absolute paths
        - cd "$AMPLIFY_SOURCE_DIRECTORY/mobile-app" && echo "BUCKET_NAME=$BUCKET_NAME" > .env.production
        - cd "$AMPLIFY_SOURCE_DIRECTORY/mobile-app" && echo "FLOODWATCH_AWS_REGION=$FLOODWATCH_AWS_REGION" >> .env.production
        - cd "$AMPLIFY_SOURCE_DIRECTORY/mobile-app" && echo "FLOODWATCH_DB_MODE=$FLOODWATCH_DB_MODE" >> .env.production
        - cd "$AMPLIFY_SOURCE_DIRECTORY/mobile-app" && echo "FLOODWATCH_ALERT_MODE=$FLOODWATCH_ALERT_MODE" >> .env.production
        - cd "$AMPLIFY_SOURCE_DIRECTORY/mobile-app" && echo "NEXT_PUBLIC_FLOODWATCH_AWS_REGION=$FLOODWATCH_AWS_REGION" >> .env.production
        - cd "$AMPLIFY_SOURCE_DIRECTORY/mobile-app" && npm run build
  artifacts:
    baseDirectory: mobile-app/.next
    files:
      - '**/*'
  cache:
    paths:
      - mobile-app/node_modules/**/*
      - mobile-app/.next/cache/**/*
