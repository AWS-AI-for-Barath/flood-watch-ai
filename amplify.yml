version: 1
applications:
  - appRoot: mobile-app
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci
        build:
          commands:
            # We are inside mobile-app automatically due to appRoot
            - echo "BUCKET_NAME=$BUCKET_NAME" > .env.production
            - echo "FLOODWATCH_AWS_REGION=$FLOODWATCH_AWS_REGION" >> .env.production
            - echo "FLOODWATCH_DB_MODE=$FLOODWATCH_DB_MODE" >> .env.production
            - echo "FLOODWATCH_ALERT_MODE=$FLOODWATCH_ALERT_MODE" >> .env.production
            - echo "NEXT_PUBLIC_FLOODWATCH_AWS_REGION=$FLOODWATCH_AWS_REGION" >> .env.production
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
