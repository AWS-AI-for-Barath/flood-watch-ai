version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd mobile-app && npm ci
    build:
      commands:
        # Pre-set environment variables for the Next.js build
        - cd mobile-app && printf "BUCKET_NAME=%s\nFLOODWATCH_AWS_REGION=%s\nFLOODWATCH_DB_MODE=%s\nFLOODWATCH_ALERT_MODE=%s\nNEXT_PUBLIC_FLOODWATCH_AWS_REGION=%s\n" $BUCKET_NAME $FLOODWATCH_AWS_REGION $FLOODWATCH_DB_MODE $FLOODWATCH_ALERT_MODE $FLOODWATCH_AWS_REGION > .env.production
        - cd mobile-app && npm run build
  artifacts:
    baseDirectory: mobile-app/.next
    files:
      - '**/*'
  cache:
    paths:
      - mobile-app/node_modules/**/*
      - mobile-app/.next/cache/**/*
